name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test ./... -run "TestGenerateCode" -v

      - name: Run integration tests
        run: go test ./... -v -timeout 120s
        env:
          DOCKER_HOST: unix:///var/run/docker.sock
          JWT_SECRET: test_secret_for_ci_only_not_real

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t url-shortener .